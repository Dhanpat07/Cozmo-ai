# ============================================================
# Kubernetes Manifests for Voice AI Agent
# ============================================================

---
# AI Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: voice-ai
  labels:
    app: ai-worker
spec:
  replicas: 3              # Start with 3, HPA scales to 15
  selector:
    matchLabels:
      app: ai-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0    # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: ai-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60   # Allow in-flight calls to finish
      containers:
        - name: ai-worker
          image: your-registry/voice-ai-worker:latest
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-ai-secrets
                  key: openai-api-key
            - name: LIVEKIT_URL
              value: "ws://livekit-service:7880"
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-ai-secrets
                  key: livekit-api-key
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: voice-ai-secrets
                  key: livekit-api-secret
            - name: MAX_CALLS_PER_WORKER
              value: "8"
            - name: REDIS_URL
              value: "redis://redis-service:6379"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

---
# Horizontal Pod Autoscaler
# Scale based on active_calls metric via Prometheus adapter
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-worker-hpa
  namespace: voice-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-worker
  minReplicas: 2
  maxReplicas: 15           # 15 x 8 calls = 120 max concurrent calls
  metrics:
    # CPU-based scaling (fallback)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Custom metric: active calls per pod
    - type: Pods
      pods:
        metric:
          name: voice_ai_active_calls
        target:
          type: AverageValue
          averageValue: "6"   # Scale up when avg > 6 calls/pod (out of 8)
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # React quickly to call spikes
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: ai-worker-service
  namespace: voice-ai
spec:
  selector:
    app: ai-worker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
# LiveKit Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: voice-ai
spec:
  replicas: 1    # Single LiveKit node for <1000 calls; cluster for more
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      containers:
        - name: livekit
          image: livekit/livekit-server:latest
          ports:
            - containerPort: 7880   # WebSocket
            - containerPort: 7881   # TCP WebRTC
            - containerPort: 7882
              protocol: UDP          # UDP WebRTC
            - containerPort: 5060
              protocol: UDP          # SIP
          args: ["--config", "/etc/livekit/livekit.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/livekit
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
      volumes:
        - name: config
          configMap:
            name: livekit-config

---
# LiveKit Service (needs NodePort for SIP/RTP UDP)
apiVersion: v1
kind: Service
metadata:
  name: livekit-service
  namespace: voice-ai
spec:
  selector:
    app: livekit
  ports:
    - name: api
      port: 7880
      targetPort: 7880
    - name: webrtc-tcp
      port: 7881
      targetPort: 7881
    - name: webrtc-udp
      port: 7882
      targetPort: 7882
      protocol: UDP
    - name: sip-udp
      port: 5060
      targetPort: 5060
      protocol: UDP
  type: LoadBalancer   # Needs external IP for Twilio SIP

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: voice-ai
